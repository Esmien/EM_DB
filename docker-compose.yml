version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: pedant_db
    restart: always
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
  adminer:
    image: adminer
    container_name: adminer
    ports:
      - "8080:8080"
    restart: always
volumes:
  postgres_data: